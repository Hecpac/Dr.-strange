<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<style>
  @font-face { font-family: 'Plus Jakarta Sans'; src: url('../assets/fonts/59b15b4bcd7b1eb5-s.0x08jh8vondwt.woff2') format('woff2'); font-weight: 700; }
  @font-face { font-family: 'IBM Plex Mono'; src: url('../assets/fonts/e390973e931a41c5-s.08hd0g.321csk.woff2') format('woff2'); font-weight: 500; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .scene {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    position: relative;
    background: #21201B;
  }

  .hero-image {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 1080px;
    object-fit: cover;
  }

  .wipe-reveal {
    position: absolute;
    top: 0; right: 0;
    width: 100%;
    height: 100%;
    background: #21201B;
    z-index: 2;
  }

  .wipe-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: #CB2131;
    z-index: 3;
    box-shadow: 0 0 20px rgba(203, 33, 49, 0.6), 0 0 40px rgba(203, 33, 49, 0.3);
  }

  .label-from {
    position: absolute;
    top: 80px;
    left: 80px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: #F4EEEE;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 4;
    opacity: 0;
  }

  .label-to {
    position: absolute;
    top: 80px;
    right: 80px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: #F4EEEE;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 4;
    opacity: 0;
    text-align: right;
  }

  .logo-mark {
    position: absolute;
    bottom: 40px;
    right: 60px;
    width: 48px;
    height: 48px;
    z-index: 5;
    opacity: 0;
  }
</style>
</head>
<body>
<div class="scene" data-composition-id="beat-1-reveal" data-width="1920" data-height="1080" data-start="0" data-duration="3.2">
  <img class="hero-image" src="../assets/render-3d-poster.jpg" alt="Sketch to render">
  <div class="wipe-reveal"></div>
  <div class="wipe-line"></div>
  <div class="label-from">FROM SKETCH</div>
  <div class="label-to">TO STANDING STRUCTURE</div>
  <img class="logo-mark" src="../assets/svgs/logo-6.svg" alt="PHD">
</div>

<script src="../assets/gsap.min.js"></script>
<script>
(function() {
  const tl = gsap.timeline({ paused: true });

  const scene = document.querySelector('.scene');
  const heroImg = document.querySelector('.hero-image');
  const wipeReveal = document.querySelector('.wipe-reveal');
  const wipeLine = document.querySelector('.wipe-line');
  const labelFrom = document.querySelector('.label-from');
  const labelTo = document.querySelector('.label-to');
  const logo = document.querySelector('.logo-mark');

  // Slow zoom on hero image throughout beat
  tl.to(heroImg, { scale: 1.02, duration: 3.8, ease: "none" }, 0);

  // "FROM SKETCH" types on at 0.3s
  tl.to(labelFrom, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.3);

  // Red wipe line sweeps right-to-left at 0.8s revealing render
  tl.fromTo(wipeLine,
    { left: "100%" },
    { left: "0%", duration: 1.5, ease: "power2.inOut" },
    0.8
  );

  // Wipe reveal follows the line
  tl.to(wipeReveal,
    { width: "0%", duration: 1.5, ease: "power2.inOut" },
    0.9
  );

  // "TO STANDING STRUCTURE" slides in from right at wipe completion
  tl.fromTo(labelTo,
    { x: 60, opacity: 0 },
    { x: 0, opacity: 1, duration: 0.5, ease: "power2.out" },
    2.3
  );

  // Logo mark fades in at 3s
  tl.to(logo, { opacity: 1, duration: 0.3, ease: "power2.out" }, 3.0);

  // Exit transition: velocity-matched upward
  tl.to(scene.children, {
    y: -150,
    opacity: 0,
    filter: "blur(30px)",
    duration: 0.33,
    ease: "power2.in",
    stagger: 0.02
  }, 3.47);

  window.__timelines = window.__timelines || {};
  window.__timelines["beat-1-reveal"] = tl;
})();
</script>
</body>
</html>
