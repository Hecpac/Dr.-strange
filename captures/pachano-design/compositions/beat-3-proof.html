<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<style>
  @font-face { font-family: 'Plus Jakarta Sans'; src: url('../assets/fonts/59b15b4bcd7b1eb5-s.0x08jh8vondwt.woff2') format('woff2'); font-weight: 700; }
  @font-face { font-family: 'IBM Plex Mono'; src: url('../assets/fonts/e390973e931a41c5-s.08hd0g.321csk.woff2') format('woff2'); font-weight: 500; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .scene {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    position: relative;
    background: #1C1C1C;
  }

  .bg-photo {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 1080px;
    object-fit: cover;
    opacity: 0;
    filter: blur(2px);
  }

  .stats-container {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 60px;
    z-index: 2;
  }

  .stat-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .stat-number {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 120px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1;
    opacity: 0;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: #CB2131;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
  }

  .accent-line {
    width: 400px;
    height: 3px;
    background: #CB2131;
    transform-origin: left center;
    transform: scaleX(0);
  }
</style>
</head>
<body>
<div class="scene" data-comp-id="beat-3-proof" data-composition-id="beat-3-proof" data-width="1920" data-height="1080" data-start="0" data-duration="5.4">
  <img class="bg-photo" id="bg-rockcliff" src="../screenshots/scroll-031.png" alt="Rockcliff Residence">
  <img class="bg-photo" id="bg-pueblo" src="../screenshots/scroll-048.png" alt="Pueblo Residence">
  <img class="bg-photo" id="bg-pool" src="../assets/image.jpg" alt="Modern home with pool">

  <div class="stats-container">
    <div class="stat-group">
      <div class="stat-number" id="stat-projects">0</div>
      <div class="stat-label" id="label-projects">PROJECTS COMPLETED</div>
    </div>

    <div class="accent-line" id="accent-line"></div>

    <div class="stat-group">
      <div class="stat-number" id="stat-ontime">0</div>
      <div class="stat-label" id="label-ontime">ON-TIME COMPLETION</div>
    </div>
  </div>
</div>

<script src="../assets/gsap.min.js"></script>
<script>
(function() {
  const tl = gsap.timeline({ paused: true });

  const bgRockcliff = document.getElementById('bg-rockcliff');
  const bgPueblo = document.getElementById('bg-pueblo');
  const bgPool = document.getElementById('bg-pool');
  const statProjects = document.getElementById('stat-projects');
  const labelProjects = document.getElementById('label-projects');
  const statOntime = document.getElementById('stat-ontime');
  const labelOntime = document.getElementById('label-ontime');
  const accentLine = document.getElementById('accent-line');
  const scene = document.querySelector('.scene');

  // --- Background photos: Ken Burns slow drift, 30% opacity, crossfade ---

  // Rockcliff fades in at start
  tl.to(bgRockcliff, { opacity: 0.3, duration: 0.5, ease: "power2.out" }, 0);
  tl.to(bgRockcliff, { x: 15, y: -8, duration: 5.8, ease: "none" }, 0);

  // Pueblo crossfades in at 3s
  tl.to(bgPueblo, { opacity: 0.3, duration: 1, ease: "power2.inOut" }, 3);
  tl.to(bgRockcliff, { opacity: 0, duration: 1, ease: "power2.inOut" }, 3);
  tl.to(bgPueblo, { x: -12, y: 6, duration: 2.8, ease: "none" }, 3);

  // Pool image stays as subtle base layer
  tl.to(bgPool, { opacity: 0.15, duration: 1, ease: "power2.out" }, 0);
  tl.to(bgPool, { x: 8, y: -5, duration: 5.8, ease: "none" }, 0);

  // --- "835+" counts up from 0 over 2s ---
  tl.to(statProjects, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0);
  var counterProjects = { val: 0 };
  tl.to(counterProjects, {
    val: 835,
    duration: 2,
    ease: "power2.out",
    onUpdate: function() {
      statProjects.textContent = Math.round(counterProjects.val) + "+";
    }
  }, 0);

  // --- "PROJECTS COMPLETED" types on at count completion (2s), 0.4s duration ---
  var projectsText = "PROJECTS COMPLETED";
  tl.to(labelProjects, { opacity: 1, duration: 0.01 }, 2);
  tl.to({ chars: 0 }, {
    chars: projectsText.length,
    duration: 0.4,
    ease: "none",
    onUpdate: function() {
      var count = Math.round(this.targets()[0].chars);
      labelProjects.textContent = projectsText.substring(0, count);
    }
  }, 2);

  // --- Pause 0.5s (2.0 + 0.4 + 0.5 = 2.9s) ---

  // --- "94%" counts up from 0 over 1.5s starting at 2.9s ---
  tl.to(statOntime, { opacity: 1, duration: 0.3, ease: "power2.out" }, 2.9);
  var counterOntime = { val: 0 };
  tl.to(counterOntime, {
    val: 94,
    duration: 1.5,
    ease: "power2.out",
    onUpdate: function() {
      statOntime.textContent = Math.round(counterOntime.val) + "%";
    }
  }, 2.9);

  // --- "ON-TIME COMPLETION" types on at count completion (2.9 + 1.5 = 4.4s) ---
  var ontimeText = "ON-TIME COMPLETION";
  tl.to(labelOntime, { opacity: 1, duration: 0.01 }, 4.4);
  tl.to({ chars: 0 }, {
    chars: ontimeText.length,
    duration: 0.4,
    ease: "none",
    onUpdate: function() {
      var count = Math.round(this.targets()[0].chars);
      labelOntime.textContent = ontimeText.substring(0, count);
    }
  }, 4.4);

  // --- Red accent line draws left-to-right, 0.3s ---
  tl.to(accentLine, { scaleX: 1, duration: 0.3, ease: "power2.out" }, 4.8);

  // --- Exit: scale 1->1.2 + blur:20px + opacity:0, 0.2s power3.in at ~5.5s ---
  tl.to('.stats-container', {
    scale: 1.2,
    filter: "blur(20px)",
    opacity: 0,
    duration: 0.2,
    ease: "power3.in"
  }, 5.5);
  tl.to([bgRockcliff, bgPueblo, bgPool], {
    scale: 1.2,
    filter: "blur(20px)",
    opacity: 0,
    duration: 0.2,
    ease: "power3.in"
  }, 5.5);

  window.__timelines = window.__timelines || {};
  window.__timelines["beat-3-proof"] = tl;
})();
</script>
</body>
</html>
